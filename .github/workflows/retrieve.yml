name: Retrieve Single File

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'Direct download URL of the file'
        required: true

permissions:
  contents: write

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download file
        run: |
          URL="${{ github.event.inputs.download_url }}"
          echo "Downloading: $URL"
          wget --content-disposition "$URL"
          # Capture the downloaded filename
          DOWNLOADED_FILE=$(ls -t | head -1)
          echo "DOWNLOADED_FILE=$DOWNLOADED_FILE" >> $GITHUB_ENV

      - name: Push file to repo
        run: |
          mkdir -p downloads
          # Move all downloaded files (not directories) into downloads/
          find . -maxdepth 1 -type f -not -name 'README.md' -exec mv {} downloads/ \;
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads/
          if ! git diff --staged --quiet; then
            git commit -m "Add new file"
            git push
          else
            echo "No changes to commit."
          fi
