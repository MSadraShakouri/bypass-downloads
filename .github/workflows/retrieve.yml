name: Retrieve and Split File

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'Direct download URL of the file'
        required: true
      output_name:
        description: 'Name for the final file (optional, defaults to original)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch-split-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download the file
        run: |
          URL="${{ github.event.inputs.download_url }}"
          echo "Downloading: $URL"
          wget --content-disposition "$URL"
          # The downloaded file name is saved in variable DOWNLOADED_FILE
          DOWNLOADED_FILE=$(ls -t | head -1)
          echo "DOWNLOADED_FILE=$DOWNLOADED_FILE" >> $GITHUB_ENV

      - name: Determine output name
        run: |
          if [ -n "${{ github.event.inputs.output_name }}" ]; then
            FINAL_NAME="${{ github.event.inputs.output_name }}"
          else
            FINAL_NAME="${{ env.DOWNLOADED_FILE }}"
          fi
          # Sanitize: remove spaces and special characters if needed
          FINAL_NAME=$(echo "$FINAL_NAME" | tr ' ' '_')
          echo "FINAL_NAME=$FINAL_NAME" >> $GITHUB_ENV

      - name: Split into zip parts (max 20 MB each)
        run: |
          # Rename original file to its final name
          mv "${{ env.DOWNLOADED_FILE }}" "${{ env.FINAL_NAME }}"
          FILENAME="${{ env.FINAL_NAME }}"
          ZIP_BASE="${FILENAME}.zip"
          zip -s 20m "$ZIP_BASE" "$FILENAME"
          echo "ZIP_BASE=$ZIP_BASE" >> $GITHUB_ENV

      - name: Commit and push parts
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # Put all parts in a subfolder to keep the repo tidy
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          FOLDER="downloads/$TIMESTAMP"
          mkdir -p "$FOLDER"
          mv ${{ env.ZIP_BASE }}* "$FOLDER/"
          git add "$FOLDER"
          git commit -m "Add split parts for ${{ env.FINAL_NAME }}"
          git push
